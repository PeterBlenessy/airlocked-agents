# compose/khoj.yml — Khoj on the Mac, localhost only, talking to your llama.cpp server.
# Khoj needs a Postgres (pgvector) database; it runs as a second service on a private compose
# network and is never exposed to the host. The docs folder is mounted READ-ONLY on purpose.
# Used for CONTAINER_RUNTIME=colima|docker. (Apple `container` uses mac/khoj-runtime.sh instead.)
services:
  database:
    image: ${KHOJ_DB_IMAGE:-pgvector/pgvector:pg16}
    container_name: khoj-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${KHOJ_DB_USER:-khoj}
      - POSTGRES_PASSWORD=${KHOJ_DB_PASSWORD:-khoj}
      - POSTGRES_DB=${KHOJ_DB_NAME:-khoj}
    volumes:
      - khoj_db:/var/lib/postgresql/data       # named volume → correct perms, persistent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KHOJ_DB_USER:-khoj}"]
      interval: 5s
      timeout: 5s
      retries: 20
    # No ports published — reachable only by Khoj on the internal compose network.

  khoj:
    image: ${KHOJ_IMAGE:-ghcr.io/khoj-ai/khoj:latest}
    container_name: khoj
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "127.0.0.1:${KHOJ_PORT:-42110}:42110"     # localhost only
    extra_hosts:
      - "host.docker.internal:host-gateway"        # reach llama.cpp on the host
    # --host=0.0.0.0 so the published port reaches it; --anonymous-mode/--non-interactive avoid
    # the first-boot admin prompt that otherwise blocks startup.
    command: ["--host=0.0.0.0", "--port=42110", "--anonymous-mode", "--non-interactive"]
    environment:
      # Point Khoj's chat model at the local llama.cpp OpenAI-compatible endpoint.
      - KHOJ_DEFAULT_CHAT_MODEL=local
      - OPENAI_API_BASE=http://host.docker.internal:${LLAMA_PORT:-8080}/v1
      - OPENAI_API_KEY=${LLAMA_API_KEY:-local-only}
      - KHOJ_ADMIN_EMAIL=${KHOJ_ADMIN_EMAIL:-admin@example.com}
      - KHOJ_ADMIN_PASSWORD=${KHOJ_ADMIN_PASSWORD:-change-me-admin}
      - KHOJ_NO_HTTPS=True
      # Database connection.
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${KHOJ_DB_USER:-khoj}
      - POSTGRES_PASSWORD=${KHOJ_DB_PASSWORD:-khoj}
      - POSTGRES_DB=${KHOJ_DB_NAME:-khoj}
    volumes:
      - khoj_data:/root/.khoj
      - ${KHOJ_DOCS_DIR}:/data/research:ro          # your corpus, READ-ONLY

volumes:
  khoj_data:
  khoj_db:
