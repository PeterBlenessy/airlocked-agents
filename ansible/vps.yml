---
# ansible/vps.yml — provision the VPS: Docker, n8n, firewall, WireGuard, Suna bootstrap. Idempotent.
- name: Provision the VPS automation glue and research rig
  hosts: vps
  become: true
  gather_facts: true
  vars:
    repo_root: "{{ playbook_dir }}/.."
    app_dir: /opt/airlocked-agents
    wg_listen_port: "{{ lookup('env','WG_LISTEN_PORT') | default('51820', true) }}"
    mac_tunnel_ip: "{{ lookup('env','MAC_TUNNEL_IP') | default('10.10.0.2', true) }}"
    admin_ip: "{{ lookup('env','ADMIN_IP') | default('', true) }}"
    # SSH_HARDENED gates SSH exposure; `make harden` overrides it to true via -e.
    ssh_hardened: "{{ lookup('env','SSH_HARDENED') | default('false', true) | bool }}"
    # SSH source allowlist when hardened: the Mac's tunnel peer, plus an optional break-glass IP.
    ssh_allowed_sources: "{{ [mac_tunnel_ip] + ([admin_ip] if (admin_ip | length > 0) else []) }}"

  tasks:
    # ---- Base: Docker ----
    - name: Install Docker engine + compose plugin
      ansible.builtin.shell: |
        if ! command -v docker >/dev/null 2>&1; then
          curl -fsSL https://get.docker.com | sh
        fi
      args:
        creates: /usr/bin/docker
      tags: [docker]

    - name: Ensure app directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0750"
      tags: [docker]

    - name: Copy compose + n8n assets to the VPS
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ app_dir }}/{{ item.dest }}"
        mode: "0640"
      loop:
        - { src: "{{ repo_root }}/compose/n8n.yml", dest: "n8n.yml" }
        - { src: "{{ repo_root }}/n8n/", dest: "n8n/" }
      tags: [n8n]

    - name: Render the VPS .env for compose (from controller environment)
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        mode: "0600"
        content: |
          N8N_IMAGE={{ lookup('env','N8N_IMAGE') }}
          N8N_HOST={{ lookup('env','N8N_HOST') }}
          N8N_BASIC_AUTH_USER={{ lookup('env','N8N_BASIC_AUTH_USER') }}
          N8N_BASIC_AUTH_PASSWORD={{ lookup('env','N8N_BASIC_AUTH_PASSWORD') }}
          N8N_ENCRYPTION_KEY={{ lookup('env','N8N_ENCRYPTION_KEY') }}
          GENERIC_TIMEZONE={{ lookup('env','GENERIC_TIMEZONE') }}
      no_log: true
      tags: [n8n]

    - name: Bring up n8n (idempotent)
      ansible.builtin.command:
        cmd: docker compose --env-file {{ app_dir }}/.env -f {{ app_dir }}/n8n.yml up -d
      tags: [n8n]

    # ---- Firewall: exactly three inbound rules (SSH, HTTPS, WireGuard); 443 is the only app ingress ----
    - name: Install ufw
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true
      tags: [firewall]

    - name: Default deny inbound, allow outbound
      community.general.ufw:
        direction: "{{ item.dir }}"
        policy: "{{ item.pol }}"
      loop:
        - { dir: incoming, pol: deny }
        - { dir: outgoing, pol: allow }
      tags: [firewall]

    - name: Allow HTTPS — the only public application ingress (Telegram webhook via the proxy)
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp
      tags: [firewall]

    - name: Allow the WireGuard handshake port (UDP, from anywhere — the Mac dials in)
      community.general.ufw:
        rule: allow
        port: "{{ wg_listen_port }}"
        proto: udp
      tags: [firewall]

    # ---- SSH: public during initial provisioning, locked to the tunnel after hardening ----
    - name: Allow SSH from anywhere (only while un-hardened — first provisioning needs it)
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
      when: not ssh_hardened
      tags: [firewall]

    # Safety gate: never lock SSH to the tunnel unless the Mac peer has actually handshaken,
    # otherwise hardening would lock you out of the box.
    - name: Require a recent WireGuard handshake before locking SSH to the tunnel
      ansible.builtin.shell: |
        set -o pipefail
        now=$(date +%s); ok=1
        while read -r _ ts; do
          if [ -n "$ts" ] && [ "$ts" -gt 0 ] && [ $((now - ts)) -lt 300 ]; then ok=0; fi
        done < <(wg show wg0 latest-handshakes)
        if [ "$ok" -ne 0 ]; then
          echo "No WireGuard handshake in the last 5 min — run 'make tunnel' and connect the Mac first." >&2
        fi
        exit "$ok"
      args:
        executable: /bin/bash
      changed_when: false
      when: ssh_hardened
      tags: [firewall, harden]

    - name: Lock SSH to the WireGuard tunnel peer (and optional ADMIN_IP)
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
        from_ip: "{{ item }}"
      loop: "{{ ssh_allowed_sources }}"
      when: ssh_hardened
      tags: [firewall, harden]

    - name: Remove the public (from-anywhere) SSH rule once hardened
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
        delete: true
      when: ssh_hardened
      tags: [firewall, harden]

    - name: Enable ufw
      community.general.ufw:
        state: enabled
      tags: [firewall]

    # ---- WireGuard tunnel (Mac <-> VPS) ----
    - name: Install WireGuard
      ansible.builtin.apt:
        name: wireguard
        state: present
      tags: [wireguard]

    - name: Render the VPS WireGuard config
      ansible.builtin.template:
        src: "{{ repo_root }}/wireguard/wg0.vps.conf.tmpl"
        dest: /etc/wireguard/wg0.conf
        mode: "0600"
      tags: [wireguard]

    - name: Enable and start wg0
      ansible.builtin.systemd:
        name: wg-quick@wg0
        enabled: true
        state: started
      tags: [wireguard]

    # ---- Suna research rig (semi-automated: clone + setup wizard is interactive) ----
    - name: Clone Suna
      ansible.builtin.git:
        repo: "{{ lookup('env','SUNA_REPO') }}"
        dest: "{{ app_dir }}/suna"
        version: main
      tags: [suna]

    - name: Note — finish Suna interactively
      ansible.builtin.debug:
        msg: >
          Suna cloned to {{ app_dir }}/suna. Run its setup wizard once (python setup.py),
          providing Supabase + model keys, then 'docker compose up -d'. This step is
          interactive by design and cannot be made fully deterministic.
      tags: [suna]

    # ---- n8n workflow import ----
    - name: Import n8n workflow skeletons via the CLI inside the container
      ansible.builtin.shell: |
        for f in {{ app_dir }}/n8n/workflow.*.json; do
          docker exec n8n n8n import:workflow --input="/home/node/.n8n/import.json" \
            < "$f" || echo "Import of $f needs review in the editor.";
        done
      args:
        executable: /bin/bash
      tags: [workflows]
      changed_when: false     # the loop reports per-file status; import needs editor review
      failed_when: false      # a failed import is non-fatal — finish it in the n8n editor

    # ---- Teardown ----
    - name: Stop n8n
      ansible.builtin.command:
        cmd: docker compose -f {{ app_dir }}/n8n.yml down
      tags: [never, down]
