# ansible/inventory.ini — two targets: the local Mac and the remote VPS.
# Values in {{ }} are read from .env by the Makefile and passed via environment;
# for direct ansible runs, export them or replace inline.

[mac]
localhost ansible_connection=local

# ansible_host follows SSH_HARDENED: the public host during provisioning, the WireGuard
# tunnel IP once SSH is locked to the tunnel (so management keeps working after hardening).
[vps]
vps ansible_host={{ (lookup('env','SSH_HARDENED') | default('false', true) | bool) | ternary(lookup('env','VPS_TUNNEL_IP'), lookup('env','VPS_HOST')) }} ansible_user={{ lookup('env','VPS_USER') }}

[vps:vars]
ansible_python_interpreter=/usr/bin/python3
